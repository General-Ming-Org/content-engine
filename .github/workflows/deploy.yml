name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify GCP deploy secrets
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SA: ${{ secrets.GCP_DEPLOYER_SA }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          missing=0
          for name in WIF_PROVIDER DEPLOYER_SA GCP_PROJECT_ID GCP_REGION; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret for deploy — see infra/terraform/README.md (GitHub Actions secrets)."
              echo "  Required: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_DEPLOYER_SA, GCP_PROJECT_ID, GCP_REGION"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Enable WIF: set enable_github_wif=true in terraform.tfvars, terraform apply, then copy outputs to GitHub secrets."
            exit 1
          fi

      - id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        env:
          REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/content-engine
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$REGISTRY/backend:${{ steps.tag.outputs.tag }}" \
            -t "$REGISTRY/backend:latest" \
            --push \
            ./backend

      - name: Build & push frontend
        env:
          REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/content-engine
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$REGISTRY/frontend:${{ steps.tag.outputs.tag }}" \
            -t "$REGISTRY/frontend:latest" \
            --push \
            ./frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Verify GCP deploy secrets
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SA: ${{ secrets.GCP_DEPLOYER_SA }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_VM_NAME: ${{ secrets.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ secrets.GCP_VM_ZONE }}
          GCP_PUBLIC_HOST: ${{ secrets.GCP_PUBLIC_HOST }}
        run: |
          missing=0
          for name in WIF_PROVIDER DEPLOYER_SA GCP_PROJECT_ID GCP_REGION GCP_VM_NAME GCP_VM_ZONE GCP_PUBLIC_HOST; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Validate compose config
        env:
          ARTIFACT_REGISTRY_URL: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/content-engine
          TAVILY_API_KEY: ci-placeholder
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q

      - name: Resolve deploy targets
        id: target
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "${{ secrets.GCP_PUBLIC_HOST }}" ]; then
            echo "GCP_PUBLIC_HOST secret is required (your Cloud DNS domain)." >&2
            exit 1
          fi
          MCP_IP=$(gcloud compute instances describe ${{ secrets.GCP_VM_NAME }} \
            --zone ${{ secrets.GCP_VM_ZONE }} --project "$GCP_PROJECT_ID" \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "host=${{ secrets.GCP_PUBLIC_HOST }}" >> "$GITHUB_OUTPUT"
          echo "mcp_ip=$MCP_IP" >> "$GITHUB_OUTPUT"

      - name: Pull latest and restart on VM
        env:
          REGISTRY_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
        run: |
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
            --zone ${{ secrets.GCP_VM_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --command "set -e
              cd /opt/content-engine
              sudo git fetch --depth=1 origin main
              sudo git reset --hard origin/main
              sudo bash scripts/vm_registry_login.sh ${REGISTRY_HOST}
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml down || true
              sudo docker system prune -af || true
              sudo docker builder prune -af || true
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml restart nginx
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend alembic -c migrations/alembic.ini upgrade head
              sudo bash scripts/install_ops_agent.sh || echo '[deploy] ops agent install skipped'
              sudo systemctl start content-engine-dns.service || \
                sudo python3 scripts/update_cloud_dns.py"

      - name: Post-deployment smoke tests
        env:
          API_URL: https://${{ steps.target.outputs.host }}
          FRONTEND_URL: https://${{ steps.target.outputs.host }}
          MCP_URL: http://${{ steps.target.outputs.mcp_ip }}:8002
          SMOKE_INSECURE: ${{ secrets.GCP_TLS_TRUSTED == 'true' && '' || '1' }}
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh "$API_URL" "$FRONTEND_URL" "$MCP_URL"
