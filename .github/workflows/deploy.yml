name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # don't cancel mid-deploy

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        env:
          REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/content-engine
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$REGISTRY/backend:${{ steps.tag.outputs.tag }}" \
            -t "$REGISTRY/backend:latest" \
            --push \
            ./backend

      - name: Build & push frontend
        env:
          REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/content-engine
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$REGISTRY/frontend:${{ steps.tag.outputs.tag }}" \
            -t "$REGISTRY/frontend:latest" \
            --push \
            ./frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Pull latest and restart on VM
        run: |
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
            --zone ${{ secrets.GCP_VM_ZONE }} \
            --tunnel-through-iap \
            --command "set -e
              cd /opt/content-engine
              sudo git fetch --depth=1 origin main
              sudo git reset --hard origin/main
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
              sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
              sudo docker compose exec -T backend alembic -c migrations/alembic.ini upgrade head"

      - name: Smoke test health endpoint
        env:
          API_URL: http://${{ secrets.GCP_VM_IP }}:8000
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "$API_URL/api/health" | grep -q '"status"'; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts."
          exit 1
