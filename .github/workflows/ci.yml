name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: content_engine
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: content_engine
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U content_engine"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint check (ruff if present)
        working-directory: backend
        run: |
          pip install ruff
          ruff check . || true   # don't block on lint while the project is new

      - name: Run tests
        working-directory: backend
        env:
          # Quoted because of the trailing colon — YAML otherwise reads it as a mapping separator.
          DATABASE_URL: "postgresql://content_engine:testpassword@localhost:5432/content_engine"
          REDIS_URL: "redis://localhost:6379/0"
          QDRANT_URL: "http://localhost:6333"
          # Phase 1 no-defaults policy: required env vars. Tests mock the real APIs;
          # these only need to be non-empty to satisfy LLMConfigurationError / EmbeddingConfigurationError.
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o-mini
          EMBEDDING_PROVIDER: openai
          EMBEDDING_MODEL: text-embedding-3-small
          OPENAI_API_KEY: test-openai-key
          ANTHROPIC_API_KEY: test-anthropic-key
          TAVILY_API_KEY: test-tavily-key
          VOYAGE_API_KEY: test-voyage-key
          APP_SECRET_KEY: test-secret-key-not-for-prod
        run: pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build:prod

  terraform-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - name: Validate
        working-directory: infra/terraform
        run: |
          terraform init -backend=false
          terraform validate
          terraform fmt -check -recursive

  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env file for compose validation
        run: cp .env.example .env
      - name: Validate production compose merge
        env:
          ARTIFACT_REGISTRY_URL: us-central1-docker.pkg.dev/example-project/content-engine
          TAVILY_API_KEY: ci-placeholder
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.bootstrap.yml config -q
          echo "docker compose overlays validate cleanly"
