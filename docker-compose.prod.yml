# Production overrides for the VM. Used in addition to docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Changes from dev:
#   - Pulls images from Artifact Registry instead of building locally.
#   - No source-mount volumes — code is baked into the image.
#   - nginx terminates TLS (self-signed by default; certbot for Let's Encrypt).
#   - Restart policy hardened.

services:
  tls-init:
    build:
      context: ./infra/nginx
    restart: "no"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
      TLS_MODE: ${TLS_MODE:-selfsigned}
      VM_IP: ${VM_IP:-}
    volumes:
      - tls_certs:/certs
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      tls-init:
        condition: service_completed_successfully
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - tls_certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    command: /bin/sh -c 'while [ ! -f /etc/nginx/certs/fullchain.pem ]; do sleep 1; done; nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot:v3.0.1
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - tls_certs:/certs
      - ./infra/nginx/renew-certs.sh:/renew-certs.sh:ro
    entrypoint: /bin/sh
    command: /renew-certs.sh

  backend:
    image: ${ARTIFACT_REGISTRY_URL}/backend:latest
    build: null
    ports: !reset []
    volumes:
      - playwright_data:/root/.cache/ms-playwright
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always

  worker:
    image: ${ARTIFACT_REGISTRY_URL}/backend:latest
    build: null
    volumes:
      - playwright_data:/root/.cache/ms-playwright
    restart: always

  beat:
    image: ${ARTIFACT_REGISTRY_URL}/backend:latest
    build: null
    restart: always

  knowledge-mcp:
    image: ${ARTIFACT_REGISTRY_URL}/backend:latest
    build: null
    restart: always

  frontend:
    image: ${ARTIFACT_REGISTRY_URL}/frontend:latest
    build: null
    ports: !reset []
    volumes: []
    environment:
      VITE_API_URL: ""
    restart: always

  db:
    restart: always

  redis:
    restart: always

  qdrant:
    restart: always

volumes:
  playwright_data:
  tls_certs:
  certbot_conf:
  certbot_www:
